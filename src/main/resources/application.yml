spring:
  application:
    name: springboot-rag
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: rag
    password: rag
  sql:
    init:
      mode: always   # run schema.sql on startup
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB

app:
  embedding:
    provider: ollama
    model: nomic-embed-text
    dimension: 768
  chat:
    model: qwen3:8b
    context-chunks: 5
  ollama:
    base-url: http://localhost:11434
  qdrant:
    host: localhost
    port: 6334
    collection: chunks
  rerank:
    provider: ""          # set to "djl" to enable the real bge-reranker cross-encoder
    model: BAAI/bge-reranker-base
    candidates: 50        # hybrid candidates fed to the reranker before trimming to topK
    maxLength: 512

management:
  endpoints:
    web:
      exposure:
        include: health
